<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0d0d0f" />
		<title>RPE Tracker</title>
		<script>
			// Тема до первой отрисовки — иначе вспышка светлой темы у тёмных пользователей
			const theme = localStorage.getItem("rpe-theme") ?? "dark";
			const dark =
				theme === "dark" ||
				(theme === "system" &&
					matchMedia("(prefers-color-scheme: dark)").matches);
			document.documentElement.classList.toggle("dark", dark);
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
